<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTV 2026 - De Duo Challenge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, push, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBRq1HFmhrpW_EMMZwpURrbTArz-L5iWT4",
            databaseURL: "https://pvaangifteinleveren-77dbe-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "pvaangifteinleveren-77dbe"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const casusData = {
            '1': { 
                e: 'Verdriet', img: 'verdriet.jpg', ph: "Beschrijf specifiek de waarnemingen van de betrokkene...", k: "Rode ogen, traanvocht, zakdoekje.",
                context: "OC: Melding tasjesroof. Locatie: Proosdijpark, Ede, Veenderweg, ter hoogte van de de vijder aan de zijde van de kinderboerderij. Betrokkene: Mevr. A. de Vries (68). Tijd: 14:15u. Situatie: Erg druk in het park met wandelaars. Dader is weggerend in de richting van de rotonde Veenderweg en Proosdijerveldwelg te Ede."
            },
            '2': { 
                e: 'Paniek', img: 'paniek.jpg', ph: "Focus op ademhaling, houding en stand van de ogen...", k: "Handen in haar, oogwit zichtbaar, open mond.",
                context: "OC: Melding via praatpaal. Locatie: Parkeergarage Q-Park Ede Centrum, Molenstraat, Ede, niveau -2. Betrokkene: Dhr. S. Janssen (42). Tijd: 23:45u. Situatie: Garage is vrijwel uitgestorven en donker. Man denkt te worden achtervolgd."
            },
            '3': { 
                e: 'Onverschillig', img: 'onverschillig.jpg', ph: "Hoe reageert de betrokkene op jouw vordering? Beschrijf de blik...", k: "Afgewende blik, lippen stijf, armen gekruist.",
                context: "OC: Melding overlast jeugd. Locatie: Museumplein, Ede. Betrokkene: Joey B. (19). Tijd: 03:20u. Situatie: Onrustig en druk op het plein door sluitingstijd horeca. Joey weigert ID-controle."
            },
            '4': { 
                e: 'Verliefd', img: 'verliefd.jpg', ph: "Beschrijf de mimiek en focus van de betrokkenen...", k: "Oogcontact, opgetrokken mondhoeken, naar voren gebogen.",
                context: "OC: Melding verdacht gedrag. Locatie: Stadspark, Bergstraat, Ede. Betrokkenen: Koppel op kleedje. Tijd: 19:30u. Situatie: Rustig deel van het park. Melder vond het gedrag 'vreemd', maar situatie oogt vreedzaam."
            },
            '5': { 
                e: 'Alcohol', img: 'alcohol.jpg', ph: "Noteer de fysieke kenmerken in het gezicht en de motoriek...", k: "Bloeddoorlopen ogen, hangende oogleden, glazig.",
                context: "OC: Melding openbare dronkenschap. Locatie: Winkelcentrum Parkweide, ter hoogte van de Bruna, Ede. Betrokkene: Dhr. R. Pietersen. Tijd: 16:10u. Situatie: Zeer druk met winkelend publiek. Man wankelt tegen geparkeerde auto's aan de Kernhemseweg."
            },
            '6': { 
                e: 'Drugs', img: 'drugs.jpg', ph: "Focus op de pupillen en onwillekeurige spierbewegingen...", k: "Pupilgrootte, kaakklem, zweten.",
                context: "OC: Melding onwelwording/afwijkend gedrag. Locatie: Hoek Telefoonweg en de Brouwerstraat, Ede. Betrokkene: Onbekende vrouw (~25j). Tijd: 22:00u. Situatie: Matig druk uitgaanspubliek. Vrouw praat extreem snel en is zeer onrustig."
            }
        };

        let assignedCasussen = [];
        let currentStep = 0; 

        window.login = () => {
            const voornaam = document.getElementById('naam').value.trim();
            if(!voornaam) return alert("Agent, voer je voornaam in.");
            window.voornaam = voornaam;
            const ids = Object.keys(casusData);
            while(assignedCasussen.length < 2) {
                let r = ids[Math.floor(Math.random() * ids.length)];
                if(!assignedCasussen.includes(r)) assignedCasussen.push(r);
            }
            document.getElementById('auth-scherm').classList.add('hidden');
            document.getElementById('hoofd-scherm').classList.remove('hidden');
            loadCurrentCasus();
            initFeed();
            initLearningFeed();
        };

        function loadCurrentCasus() {
            if(currentStep >= 2) {
                document.getElementById('input-section').innerHTML = `
                    <div class="bg-blue-900 text-white p-10 rounded-[2.5rem] text-center shadow-2xl border-b-8 border-yellow-500">
                        <h2 class="text-2xl font-black mb-4 uppercase italic tracking-tighter">Missie Voltooid!</h2>
                        <p class="text-sm opacity-90 mb-6 font-medium leading-relaxed">Geef nu feedback aan collega's in de feed.</p>
                    </div>`;
                return;
            }
            const id = assignedCasussen[currentStep];
            window.activeCasus = id;
            document.getElementById('step-indicator').innerText = `OPDRACHT ${currentStep + 1} VAN 2`;
            document.getElementById('casus-context').innerText = casusData[id].context;
            document.getElementById('casus-beeld').src = casusData[id].img;
            document.getElementById('pv-input').placeholder = "Start hier met uw PV-bevindingen in de OVT...";
            document.getElementById('pv-input').value = "";
        }

        window.verstuurPV = () => {
            const tekst = document.getElementById('pv-input').value.trim();
            if(tekst.length < 10) return alert("Geef een uitgebreidere beschrijving.");
            push(ref(db, `btv_2026/live_feed`), {
                naam: window.voornaam,
                tekst: tekst,
                correcteCasus: window.activeCasus,
                tijd: Date.now()
            });
            currentStep++;
            loadCurrentCasus();
        };

        // ... (overige functies uit uw originele code blijven gelijk voor werking feed)
        window.checkAnalysis = (postId) => {
            const analyse = document.getElementById(`input-analyse-${postId}`).value.trim();
            if(analyse.length < 2) return alert("Typ eerst je analyse van het gedrag in.");
            document.getElementById(`match-zone-${postId}`).classList.add('hidden');
            document.getElementById(`feedback-zone-${postId}`).classList.remove('hidden');
        };
        window.saveTextFeedback = (postId) => {
            const fbText = document.getElementById(`input-fb-${postId}`).value.trim();
            if(fbText.length < 2) return alert("Voer feedback in.");
            push(ref(db, `btv_2026/live_feed/${postId}/comments`), { van: window.voornaam, bericht: fbText });
            document.getElementById(`input-fb-${postId}`).value = ""; 
        };
        window.saveLeerpunt = (postId) => {
            const lpText = document.getElementById(`input-lp-${postId}`).value.trim();
            if(lpText.length < 5) return alert("Formuleer je leerpunt iets vollediger.");
            update(ref(db, `btv_2026/live_feed/${postId}`), { leerpunt: lpText });
            push(ref(db, `btv_2026/leermomenten_anoniem`), { tekst: lpText, tijd: Date.now() });
        };
        function initFeed() {
            const container = document.getElementById('live-feed');
            onValue(ref(db, `btv_2026/live_feed`), (snap) => {
                const data = snap.val();
                if(!data) { container.innerHTML = ""; return; }
                Object.keys(data).reverse().forEach(key => {
                    const post = data[key];
                    const isEigenPost = post.naam === window.voornaam;
                    let postDiv = document.getElementById(`post-${key}`);
                    if (!postDiv) {
                        postDiv = document.createElement('div');
                        postDiv.id = `post-${key}`;
                        postDiv.className = `bg-white p-6 rounded-[2.5rem] shadow-sm border-2 mb-8 ${isEigenPost ? 'border-yellow-400 ring-4 ring-yellow-50/50' : 'border-slate-100'}`;
                        container.appendChild(postDiv);
                    }
                    postDiv.innerHTML = `
                        <div class="flex justify-between items-center mb-4 font-black uppercase italic text-[10px]">
                            <span class="${isEigenPost ? 'text-yellow-600' : 'text-slate-400'}">Agent: ${post.naam}</span>
                        </div>
                        <p class="text-sm italic mb-6 text-slate-800 border-l-4 border-blue-900 pl-4 py-2 bg-slate-50 leading-relaxed rounded-r-xl tracking-tight">"${post.tekst}"</p>
                        <div id="match-zone-${key}" class="${isEigenPost || (post.comments) ? 'hidden' : ''} space-y-3">
                            <input type="text" id="input-analyse-${key}" class="w-full p-3 rounded-xl text-xs border-2 border-slate-100 outline-none focus:border-blue-900 bg-white shadow-inner" placeholder="Analyseer gedrag...">
                            <button onclick="checkAnalysis('${key}')" class="w-full bg-blue-900 text-white p-3 rounded-xl text-[9px] font-black uppercase">Bevestig & Review</button>
                        </div>
                        <div id="feedback-zone-${key}" class="${isEigenPost || post.comments ? '' : 'hidden'} mt-4 pt-4 border-t border-slate-100">
                            <div class="space-y-2 mb-4">
                                ${post.comments ? Object.values(post.comments).map(c => `<div class="bg-blue-50 p-3 rounded-2xl text-[10px]"><span class="font-black text-blue-900 uppercase text-[8px]">${c.van}:</span> <span class="text-slate-700 font-medium">${c.bericht}</span></div>`).join('') : '<p class="text-[9px] italic text-slate-300 text-center uppercase tracking-widest">Wacht op feedback...</p>'}
                            </div>
                            ${isEigenPost && !post.leerpunt ? `<div class="bg-yellow-50 p-4 rounded-[1.5rem] border-2 border-yellow-200"><textarea id="input-lp-${key}" class="w-full p-3 rounded-xl text-xs outline-none bg-white mb-2" placeholder="Wat is je leerpunt?"></textarea><button onclick="saveLeerpunt('${key}')" class="w-full bg-yellow-500 text-white p-3 rounded-xl text-[10px] font-black uppercase">Sla op</button></div>` : ''}
                            ${post.leerpunt ? `<div class="bg-emerald-600 p-3 rounded-xl text-white text-[10px] font-bold italic shadow-lg">Leerpunt: ${post.leerpunt}</div>` : ''}
                            ${!isEigenPost ? `<textarea id="input-fb-${key}" class="w-full p-3 rounded-xl text-xs border-2 border-slate-50 outline-none bg-slate-100 mb-2" placeholder="Feedback..."></textarea><button onclick="saveTextFeedback('${key}')" class="w-full bg-blue-900 text-white p-2 rounded-xl text-[9px] font-black uppercase">Verzenden</button>` : ''}
                        </div>`;
                });
            });
        }
        function initLearningFeed() {
            onValue(ref(db, `btv_2026/leermomenten_anoniem`), (snap) => {
                const list = document.getElementById('anonieme-leertips');
                list.innerHTML = "";
                const data = snap.val();
                if(!data) return;
                Object.values(data).reverse().forEach(l => {
                    list.innerHTML += `<div class="bg-white p-4 rounded-2xl text-[11px] font-semibold text-blue-900 border-l-8 border-blue-900 shadow-sm italic leading-relaxed">“${l.tekst}”</div>`;
                });
            });
        }
        window.resetDatabase = () => { if(confirm("Alle data wissen?")) remove(ref(db, `btv_2026`)).then(() => location.reload()); };
        window.toggleLeeroverzicht = () => { document.getElementById('leer-modal').classList.toggle('hidden'); document.getElementById('tabel-body').innerHTML = Object.keys(casusData).map(key => `<tr class="border-b text-[10px]"><td class="p-2 font-black text-blue-900 uppercase">Casus ${key}</td><td class="p-2 italic text-slate-600">${casusData[key].k}</td></tr>`).join(''); };
    </script>
</head>
<body class="bg-slate-50 font-sans text-slate-900">
    <div id="leer-modal" class="fixed inset-0 bg-black/90 z-[60] hidden flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-[3rem] max-w-2xl w-full p-10 shadow-2xl">
            <h2 class="font-black text-2xl text-blue-900 mb-6 uppercase italic text-center">Checklist</h2>
            <table class="w-full text-left mb-6 border-collapse"><tbody id="tabel-body"></tbody></table>
            <button onclick="toggleLeeroverzicht()" class="w-full bg-blue-900 text-white p-5 rounded-2xl font-black uppercase tracking-widest">Terug</button>
        </div>
    </div>

    <div id="auth-scherm" class="fixed inset-0 bg-[#002d5e] z-50 flex items-center justify-center p-6 text-center">
        <div class="bg-white p-12 rounded-[4rem] shadow-2xl max-w-sm w-full border-b-[15px] border-yellow-500">
            <h1 class="font-black text-4xl text-blue-900 mb-2 uppercase italic tracking-tighter">BTV 2026</h1>
            <input type="text" id="naam" placeholder="Voornaam" class="w-full border-4 border-slate-50 p-5 rounded-3xl mb-6 font-bold text-center outline-none focus:border-blue-900 bg-slate-50">
            <button onclick="login()" class="w-full bg-[#002d5e] text-white p-6 rounded-3xl font-black uppercase tracking-widest">Start Challenge</button>
        </div>
    </div>

    <div id="hoofd-scherm" class="hidden max-w-[1600px] mx-auto p-4 md:p-10 flex flex-col lg:flex-row gap-10">
        <div class="flex-1 space-y-8">
            <header class="flex justify-between items-center bg-white p-6 rounded-[2rem] shadow-sm border-b-4 border-blue-900">
                <button onclick="toggleLeeroverzicht()" class="bg-emerald-500 text-white px-6 py-2 rounded-full text-[10px] font-black uppercase italic shadow-lg">Hulp-Checklist</button>
                <button onclick="resetDatabase()" class="text-[9px] font-black text-rose-400 uppercase border-2 border-rose-50 px-4 py-2 rounded-full">Reset</button>
            </header>

            <section id="input-section" class="bg-white p-8 rounded-[4rem] shadow-2xl border-t-[15px] border-blue-900">
                <div class="space-y-4 mb-6">
                    <div class="p-4 bg-blue-50 rounded-2xl border-l-4 border-blue-900">
                        <p class="text-[10px] font-black text-blue-900 uppercase mb-1 tracking-widest">MELDING OC:</p>
                        <p id="casus-context" class="text-xs text-slate-700 font-medium italic"></p>
                    </div>

                    <div class="p-4 bg-amber-50 rounded-2xl border-l-4 border-amber-500">
                        <p class="text-[10px] font-black text-amber-600 uppercase mb-2 tracking-widest">OPDRACHT:</p>
                        <ul class="text-[11px] text-amber-900 font-bold grid grid-cols-2 gap-y-1">
                            <li>⚠️ Denk aan uw veiligheid</li>
                            <li>⚖️ Objectief schrijven</li>
                            <li>📝 Feiten & omstandigheden</li>
                            <li>🕒 Gebruik de OVT</li>
                            <li>🧠 Redenen van wetenschap</li>
                            <li>🖼️ Kaal & veranderlijk decor</li>
                            <li class="col-span-2 mt-2 text-blue-900">📌 Toetsing op: ASTMA</li>
                        </ul>
                    </div>
                </div>

                <div class="aspect-video mb-8 bg-slate-200 rounded-[2.5rem] overflow-hidden border-4 border-white shadow-inner flex items-center justify-center">
                    <img id="casus-beeld" src="" class="max-w-full max-h-full object-contain">
                </div>
                
                <span id="step-indicator" class="text-[10px] font-black text-blue-900/30 uppercase mb-4 block text-center tracking-[0.2em]"></span>
                <textarea id="pv-input" class="w-full h-40 border-4 border-slate-50 p-6 rounded-[2rem] outline-none focus:border-blue-900 bg-slate-50 text-sm mb-6 shadow-inner resize-none transition-all"></textarea>
                <button onclick="verstuurPV()" class="w-full bg-[#002d5e] text-white py-5 rounded-[2rem] font-black uppercase tracking-[0.2em] shadow-xl text-sm">Verstuur voor review</button>
            </section>

            <section class="bg-slate-200/40 p-8 rounded-[4rem] h-[600px] overflow-y-auto shadow-inner border-4 border-white">
                <h2 class="font-black text-blue-900 uppercase italic mb-8 text-[11px] text-center tracking-[0.3em] opacity-40">Live Review Feed</h2>
                <div id="live-feed"></div>
            </section>
        </div>

        <aside class="w-full lg:w-[400px] space-y-6">
            <div class="bg-[#002d5e] p-8 rounded-[4rem] shadow-2xl h-[900px] flex flex-col sticky top-10 border-b-[15px] border-emerald-500">
                <h2 class="font-black text-emerald-400 uppercase italic mb-2 text-xl text-center">Inzichten</h2>
                <div id="anonieme-leertips" class="space-y-6 overflow-y-auto flex-1 pr-3 pb-10 mt-6"></div>
            </div>
        </aside>
    </div>
</body>
</html>
