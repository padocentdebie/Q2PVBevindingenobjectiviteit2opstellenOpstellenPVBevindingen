<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operationeel Systeem - PV Bevindingen Q2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, push, update, increment, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBRq1HFmhrpW_EMMZwpURrbTArz-L5iWT4",
            databaseURL: "https://pvaangifteinleveren-77dbe-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "pvaangifteinleveren-77dbe"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const casusData = {
            '1': { 
                titel: 'CASUS: HUISELIJK GEWELD', 
                img: 'verdriet.jpg', 
                melding: "OC MELDING: Langestraat 44. Slachtoffer: Elif Terzi. Verdachte: Murat Terzi. Buren melden hard geschreeuw en klappen.",
                feiten: "TER PLAATSE:\n- HOREN: Extreem hard, vervormd geluid uit de TV en een geluidstoren. Communicatie alleen schreeuwend mogelijk.\n- ZIEN: Elif Terzi huilt onbeheerst. Rode gezwollen vlek (2 euro munt) op linkerwang, verse kras (3cm) onder rechteroog.\n- DECOR: Woonkamer nagenoeg kaal. Houten stoel ligt omgevallen. Salontafel in scherven. Verse rode spatten (bloed) op witte muur.\n- GEDRAG: Murat staat met gebalde vuisten in de deuropening. Rook naar schraal bier.",
                placeholder: "PROCES-VERBAAL VAN BEVINDINGEN\n\nWAARNEMINGEN (INCL. DECOR & GELUID):\n- \n\nVERKLARINGEN:\n- " 
            },
            '2': { 
                titel: 'CASUS: VERMISSING KIND', 
                img: 'paniek.jpg', 
                melding: "OC MELDING: Liam de Vries (4jr) vermist vanaf speeltuin De Wip. Melder: Peter van der Laan (beveiliger).",
                feiten: "TER PLAATSE:\n- OMGEVING: Speeltuin omheind met laag hekje (60cm). Op 15 meter afstand ligt een open vijver met steile oever. Bosjesrand direct grenzend aan terrein.\n- CONDITIES: Laagstaande zon zorgt voor sterke schittering op metalen toestellen. Druk bezet (ca. 20 personen).\n- GEDRAG: Melder rent paniekerig heen en weer, handen in het haar. Roept met overslaande stem 'Liam'.\n- VERKLARING: 'Keek één seconde op mijn telefoon en hij was weg'.",
                placeholder: "PROCES-VERBAAL VAN BEVINDINGEN\n\nSITUATIE SCHETS & OMGEVINGSRISICO'S:\n- \n\nSIGNALEMENT & GEDRAG MELDER:\n- " 
            },
            '3': { 
                titel: 'CASUS: OVERLAST (MIDDELEN)', 
                img: 'drugs.jpg', 
                melding: "OC MELDING: Stationsplein. Verdachte: Kevin Schut. Melding van verward gedrag en intimidatie.",
                feiten: "TER PLAATSE:\n- UITERLIJK: Ontbloot bovenlichaam, zwarte trainingsbroek. Zweetdruppels op voorhoofd bij 10 graden.\n- INDICATOREN: Extreem grote pupillen (geen reactie op licht). Zware kaakklem (gespannen kauwspieren).\n- MOTORIEK: Ongecontroleerde, schokkerige bewegingen met armen. Probeert voorbijgangers fysiek te blokkeren.\n- GEDRAG: Praat snel en onsamenhangend tegen objecten die er niet zijn.",
                placeholder: "PROCES-VERBAAL VAN BEVINDINGEN\n\nOBJECTIEVE KENMERKEN & INDICATOREN:\n- \n- " 
            },
            '4': { 
                titel: 'CASUS: AANRIJDING & ALCOHOL', 
                img: 'alcohol.jpg', 
                melding: "OC MELDING: A28 HM 14.2. Aanrijding met letsel. Verdachte: Johannes Berends.",
                feiten: "TER PLAATSE:\n- HET FEIT: Auto diagonaal tegen vangrail, voorzijde ingedrukt. Remspoor van slechts 2 meter (te laat gereageerd).\n- VERWIJTBAARHEID: Geopend blik bier in bekerhouder (voelt nog koud aan). Bestuurder begrijpt werking gordelgesp niet.\n- INDICATOREN: Bloeddoorlopen/glazige ogen, hangende oogleden. Spreekt met dubbele tong.\n- ZINTUIGLIJK: Sterke, ambtshalve bekende alcohollucht uit de mond.",
                placeholder: "PROCES-VERBAAL VAN BEVINDINGEN\n\nVERWIJTBAARHEID & ONGEVALSCONTEXT:\n- \n\nINDICATOREN INVLOED (ASTMA):\n- " 
            }
        };

        window.login = () => {
            const naam = document.getElementById('naam').value.trim().toUpperCase();
            const klas = document.getElementById('klas-select').value;
            if(!naam || !klas) return alert("Identificatie onvolledig.");
            window.voornaam = naam;
            window.klas = klas;
            const ids = Object.keys(casusData);
            window.activeCasus = ids[Math.floor(Math.random() * ids.length)];
            document.getElementById('auth-scherm').style.display = 'none';
            document.getElementById('hoofd-scherm').classList.remove('hidden');
            document.getElementById('display-info').innerText = `KLAS: ${window.klas} | AGENT: ${window.voornaam}`;
            loadCasus();
            initFeed();
            initLearningFeed();
        };

        function loadCasus() {
            const c = casusData[window.activeCasus];
            document.getElementById('oc-text').innerHTML = `<strong>MELDING:</strong> ${c.melding}<br><br><strong>FEITEN & OMSTANDIGHEDEN:</strong><br><pre class="whitespace-pre-wrap font-mono mt-2">${c.feiten}</pre>`;
            document.getElementById('casus-img').src = c.img;
            document.getElementById('pv-input').placeholder = c.placeholder;
        }

        window.verstuurPV = () => {
            const tekst = document.getElementById('pv-input').value.trim();
            if(tekst.length < 30) return alert("Rapportage is te summier.");
            push(ref(db, `btv_2026_q2/klassen/${window.klas}/live_feed`), {
                naam: window.voornaam,
                tekst: tekst,
                casusId: window.activeCasus,
                tijd: Date.now(),
                feedback: { obj:0, astma:0, feiten:0, rvw:0, ovt:0, decor:0 },
                leerpunt: ""
            });
            document.getElementById('input-side').innerHTML = `
                <div class="p-10 border-4 border-blue-900 bg-white text-blue-900 font-bold text-center shadow-xl uppercase italic">
                    Rapportage verzonden naar ${window.klas}-feed.<br><br>
                    <span class="text-[10px] font-normal not-italic">Start nu met het beoordelen van collega-rapportages in de feed.</span>
                </div>`;
        };

        window.giveFeedback = (postId, type) => {
            update(ref(db, `btv_2026_q2/klassen/${window.klas}/live_feed/${postId}/feedback`), { [type]: increment(1) });
        };

        window.saveLeerpunt = (postId) => {
            const input = document.getElementById(`lp-in-${postId}`);
            const leerpunt = input.value.trim();
            if(leerpunt.length < 5) return alert("Verwoord je leerpunt iets vollediger.");

            update(ref(db, `btv_2026_q2/klassen/${window.klas}/live_feed/${postId}`), { leerpunt: leerpunt });
            push(ref(db, `btv_2026_q2/klassen/${window.klas}/leermomenten`), {
                tekst: leerpunt,
                tijd: Date.now()
            });
        };

        window.resetSessie = () => {
            if(confirm(`WEET JE HET ZEKER? Alle data voor klas ${window.klas} wordt permanent gewist.`)) {
                remove(ref(db, `btv_2026_q2/klassen/${window.klas}`)).then(() => {
                    alert("Database gewist. De pagina wordt herladen.");
                    location.reload();
                });
            }
        };

        function initFeed() {
            onValue(ref(db, `btv_2026_q2/klassen/${window.klas}/live_feed`), (snap) => {
                const container = document.getElementById('live-feed');
                container.innerHTML = "";
                const data = snap.val();
                if(!data) return container.innerHTML = "<p class='text-center text-[10px] text-slate-400 mt-10 uppercase text-blue-900 tracking-widest'>Wachten op eerste rapportages...</p>";

                Object.keys(data).reverse().forEach(key => {
                    const post = data[key];
                    const fb = post.feedback || {};
                    const isEigenPost = post.naam === window.voornaam;

                    container.innerHTML += `
                        <div class="bg-white border ${isEigenPost ? 'border-blue-900 ring-4 ring-blue-50' : 'border-slate-300'} p-5 mb-6 shadow-sm relative">
                            <div class="flex justify-between text-[9px] font-black text-slate-400 border-b pb-2 mb-4 uppercase tracking-tighter">
                                <span class="${isEigenPost ? 'text-blue-900' : ''}">Agent: ${post.naam} ${isEigenPost ? '(JIJ)' : ''}</span>
                                <span>${casusData[post.casusId].titel}</span>
                            </div>
                            <div class="text-[11px] font-mono leading-relaxed whitespace-pre-wrap text-slate-900 mb-6 bg-slate-50 p-3 border border-slate-100 italic">"${post.tekst}"</div>
                            
                            <div class="grid grid-cols-3 gap-1 mb-4">
                                <button onclick="giveFeedback('${key}', 'obj')" class="border border-slate-200 py-2 text-[8px] font-bold hover:bg-blue-900 hover:text-white transition-colors uppercase">Objectief (${fb.obj || 0})</button>
                                <button onclick="giveFeedback('${key}', 'astma')" class="border border-slate-200 py-2 text-[8px] font-bold hover:bg-blue-900 hover:text-white transition-colors uppercase">ASTMA (${fb.astma || 0})</button>
                                <button onclick="giveFeedback('${key}', 'feiten')" class="border border-slate-200 py-2 text-[8px] font-bold hover:bg-blue-900 hover:text-white transition-colors uppercase">Feiten (${fb.feiten || 0})</button>
                                <button onclick="giveFeedback('${key}', 'rvw')" class="border border-slate-200 py-2 text-[8px] font-bold hover:bg-blue-900 hover:text-white transition-colors uppercase">Wetenschap (${fb.rvw || 0})</button>
                                <button onclick="giveFeedback('${key}', 'ovt')" class="border border-slate-200 py-2 text-[8px] font-bold hover:bg-blue-900 hover:text-white transition-colors uppercase">OVT (${fb.ovt || 0})</button>
                                <button onclick="giveFeedback('${key}', 'decor')" class="border border-slate-200 py-2 text-[8px] font-bold hover:bg-blue-900 hover:text-white transition-colors uppercase">Decor (${fb.decor || 0})</button>
                            </div>
                            
                            ${isEigenPost && !post.leerpunt ? `
                                <div class="mt-4 p-4 bg-yellow-50 border-2 border-yellow-200 rounded-lg">
                                    <p class="text-[9px] font-black uppercase text-yellow-800 mb-2 italic tracking-widest">Zelfreflectie: Wat neem je mee uit de feedback?</p>
                                    <div class="flex gap-2">
                                        <input id="lp-in-${key}" type="text" class="flex-1 text-[10px] p-2 border-2 border-yellow-200 outline-none focus:border-yellow-500 font-bold" placeholder="Mijn belangrijkste leerpunt is...">
                                        <button onclick="saveLeerpunt('${key}')" class="bg-yellow-600 text-white px-4 text-[9px] font-black uppercase shadow-md">Sla op</button>
                                    </div>
                                </div>
                            ` : ''}

                            ${post.leerpunt ? `
                                <div class="mt-2 p-3 bg-blue-900 text-white font-black italic text-[10px] border-l-8 border-yellow-500 shadow-md">
                                    JIJ LEERDE: ${post.leerpunt}
                                </div>
                            ` : ''}
                        </div>`;
                });
            });
        }

        function initLearningFeed() {
            onValue(ref(db, `btv_2026_q2/klassen/${window.klas}/leermomenten`), (snap) => {
                const container = document.getElementById('learning-feed');
                container.innerHTML = "";
                const data = snap.val();
                if(!data) return;

                Object.values(data).reverse().forEach(item => {
                    container.innerHTML += `
                        <div class="bg-white p-4 border-l-8 border-yellow-500 mb-4 shadow-xl transform hover:scale-105 transition-transform duration-300">
                            <p class="text-[12px] font-black italic text-blue-900 leading-tight">“${item.tekst}”</p>
                        </div>`;
                });
            });
        }
    </script>
</head>
<body class="bg-slate-100 text-slate-900 font-sans antialiased">

    <div id="auth-scherm" class="fixed inset-0 bg-[#002d5e] z-50 flex items-center justify-center p-4">
        <div class="bg-white p-10 w-full max-w-sm border-t-[12px] border-yellow-600 shadow-2xl text-center">
            <h1 class="font-black text-3xl text-blue-900 mb-2 uppercase tracking-tighter italic">BTV MONITOR</h1>
            <p class="text-[10px] font-black text-slate-400 mb-10 uppercase tracking-[0.4em]">Operational Support Q2</p>
            <input type="text" id="naam" placeholder="ACHTERNAAM AGENT" class="w-full border-4 border-slate-50 p-5 mb-5 font-black bg-slate-50 uppercase text-xs focus:ring-2 focus:ring-blue-900 outline-none text-center">
            <select id="klas-select" class="w-full border-4 border-slate-50 p-5 mb-10 font-black bg-slate-50 uppercase text-xs focus:ring-2 focus:ring-blue-900 outline-none text-center">
                <option value="">SELECTEER NATO-KLAS</option>
                <option value="ALFA">ALFA</option><option value="BRAVO">BRAVO</option>
                <option value="CHARLIE">CHARLIE</option><option value="DELTA">DELTA</option>
                <option value="ECHO">ECHO</option><option value="FOXTROT">FOXTROT</option>
                <option value="GOLF">GOLF</option><option value="HOTEL">HOTEL</option>
                <option value="JULIETT">JULIETT</option><option value="KILO">KILO</option>
                <option value="LIMA">LIMA</option><option value="MIKE">MIKE</option>
            </select>
            <button onclick="login()" class="w-full bg-[#002d5e] text-white p-5 font-black uppercase text-xs tracking-widest shadow-2xl hover:bg-blue-800 transition-all border-b-4 border-blue-950 active:translate-y-1">Initialiseer Toegang</button>
        </div>
    </div>

    <div id="hoofd-scherm" class="hidden max-w-[1600px] mx-auto p-4 md:p-8">
        <header class="flex justify-between items-center mb-8 border-b-4 border-blue-900 pb-4">
            <div id="display-info" class="text-blue-900 font-black text-xs tracking-[0.2em] uppercase italic"></div>
            <div class="flex items-center gap-6">
                <div class="text-[9px] text-slate-400 font-black tracking-widest uppercase hidden sm:block">Q2-2026 // SYSTEM SECURE</div>
                <button onclick="resetSessie()" class="bg-rose-600 text-white px-4 py-2 rounded text-[9px] font-black uppercase tracking-widest shadow-lg hover:bg-rose-700 transition-all">Sessie Reset</button>
            </div>
        </header>

        <div class="grid lg:grid-cols-12 gap-8 items-start">
            
            <section id="input-side" class="lg:col-span-4">
                <div class="bg-white border-2 border-slate-200 p-8 shadow-2xl sticky top-8">
                    <h2 class="text-[11px] font-black text-blue-900 mb-6 border-b-2 border-slate-100 pb-3 uppercase tracking-[0.2em] italic">Melding OC</h2>
                    <div id="oc-text" class="bg-slate-50 p-6 font-mono text-[11px] text-slate-700 mb-8 border-l-8 border-blue-900 leading-relaxed shadow-inner italic"></div>
                    <div class="mb-8 bg-slate-900 border-4 border-white shadow-lg overflow-hidden group">
                        <img id="casus-img" class="w-full aspect-video object-cover filter contrast-125 opacity-80 group-hover:opacity-100 transition-opacity duration-500">
                    </div>
                    <textarea id="pv-input" class="w-full h-80 border-4 border-slate-50 p-6 font-mono text-[12px] bg-slate-50 focus:bg-white outline-none focus:ring-4 focus:ring-blue-50 mb-6 shadow-inner resize-none" spellcheck="false" placeholder="Typ hier de rapportage..."></textarea>
                    <button onclick="verstuurPV()" class="w-full bg-blue-900 text-white py-6 font-black uppercase text-[11px] tracking-[0.3em] shadow-xl hover:bg-blue-800 transition-all border-b-4 border-blue-950">Verzend naar Feed</button>
                </div>
            </section>

            <section class="lg:col-span-5 h-[88vh] overflow-y-auto bg-slate-200/50 p-8 border-x-2 border-slate-200 shadow-inner rounded-3xl">
                <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.4em] mb-10 text-center">Live Feedback Stream</h3>
                <div id="live-feed"></div>
            </section>

            <section class="lg:col-span-3 h-[88vh] overflow-y-auto bg-blue-900 p-8 border-l-[12px] border-yellow-500 shadow-2xl rounded-r-[3rem]">
                <h3 class="text-[11px] font-black text-yellow-500 uppercase tracking-[0.3em] mb-10 text-center italic">Klas Leermomenten</h3>
                <p class="text-[8px] text-white/30 text-center uppercase mb-8 font-bold tracking-widest">Anonieme inzichten van de hele eenheid</p>
                <div id="learning-feed" class="space-y-6">
                    </div>
                <div class="mt-20 border-t border-white/10 pt-8 text-center">
                    <div class="text-white/10 text-[7px] font-black uppercase tracking-[0.5em]">End of Transmission // BTV-2026</div>
                </div>
            </section>

        </div>
    </div>

</body>
</html>
